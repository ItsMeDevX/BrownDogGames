</div>

</div>

<script>
document.getElementById("y").textContent = new Date().getFullYear();
</script>

<script>

function loadGame(url){
document.getElementById("gameFrame").src = url
document.getElementById("gamePopup").style.display = "flex"
}

function closeGame(){
document.getElementById("gamePopup").style.display = "none"
document.getElementById("gameFrame").src = ""
}

document.addEventListener("keydown", function(e){
if(e.key === "Escape"){
closeGame()
}
})

</script>

<script type="module">

import { login, supabase } from "../supabase.js"

window.login = login

window.logout = async () => {
 await supabase.auth.signOut()
 location.reload()
}

const GAME_ID = "browser-games"

function escapeHTML(text){
 return text.replace(/[&<>"']/g, m => ({
   "&":"&amp;",
   "<":"&lt;",
   ">":"&gt;",
   '"':"&quot;",
   "'":"&#039;"
 })[m])
}

async function loadComments(){

const { data } = await supabase
.from("comments")
.select("*")
.eq("game", GAME_ID)
.order("id",{ascending:false})

const { data:{session} } = await supabase.auth.getSession()
const userId = session?.user?.id

const list=document.getElementById("commentsList")
list.innerHTML=""

if(!data) return

data.forEach(c=>{

const div=document.createElement("div")

div.style.display="flex"
div.style.gap="10px"
div.style.padding="12px"
div.style.borderBottom="1px solid #333"

const deleteBtn = userId===c.user_id
? `<button onclick="deleteComment(${c.id})">🗑</button>`
: ""

div.innerHTML = `

<a href="https://github.com/${c.username}" target="_blank">
<img src="${c.avatar_url}" style="width:40px;height:40px;border-radius:50%;">
</a>

<div style="flex:1">

<strong>
<a href="https://github.com/${c.username}" target="_blank">
${c.username}
</a>
</strong>

<br>

${escapeHTML(c.text)}

<br>

<button onclick="likeComment(${c.id},${c.likes||0})">
👍 ${c.likes||0}
</button>

${deleteBtn}

</div>
`

list.appendChild(div)

})

}

window.addComment = async function(event){

event.preventDefault()

const { data:{session} } = await supabase.auth.getSession()

if(!session){
alert("Login with GitHub to comment.")
return
}

const text=document.getElementById("commentInput").value.trim()

if(text.length<2){
alert("Comment too short")
return
}

if(text.length>300){
alert("Comment too long")
return
}

await supabase.from("comments").insert({
game: GAME_ID,
text: text,
user_id: session.user.id,
username: session.user.user_metadata.user_name,
avatar_url: session.user.user_metadata.avatar_url,
likes:0
})

document.getElementById("commentInput").value=""

}

window.likeComment = async function(id,currentLikes){

await supabase
.from("comments")
.update({likes:currentLikes+1})
.eq("id",id)

}

window.deleteComment = async function(id){

if(!confirm("Delete this comment?")) return

await supabase
.from("comments")
.delete()
.eq("id",id)

}

supabase
.channel("comments")
.on("postgres_changes",
{ event:"*", schema:"public", table:"comments" },
payload=>{
loadComments()
})
.subscribe()

supabase.auth.onAuthStateChange((event,session)=>{

if(session){

document.getElementById("loginBtn").style.display="none"
document.getElementById("logoutBtn").style.display="inline-block"
document.getElementById("userDisplay").innerText=session.user.user_metadata.user_name

}

})

const {data:{session}} = await supabase.auth.getSession()

if(session){

document.getElementById("loginBtn").style.display="none"
document.getElementById("logoutBtn").style.display="inline-block"
document.getElementById("userDisplay").innerText=session.user.user_metadata.user_name

}

loadComments()

</script>

</body>
</html>
