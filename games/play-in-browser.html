<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Play in Browser — BrownDogGames</title>

<link rel="stylesheet" href="../styles.css"/>
<link rel="icon" href="../assets/images/MainIcon.png">

<meta name="description" content="Play browser games directly on BrownDogGames.">

</head>

<body>

<header class="nav">
<div class="nav-inner">

<a class="brand" href="../index.html">
<img src="../assets/images/MainIcon.png" class="site-logo">
<span>BrownDogGames</span>
</a>

<nav class="nav-links">

<a href="../index.html">Home</a>
<a href="../games.html">Games</a>
<a href="../music.html">Music</a>
<a href="../assets.html">Templates & Assets</a>
<a href="../support.html">Support</a>
<a href="../community.html">Community</a>

<button id="loginBtn" onclick="login()">Login with GitHub</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
<span id="userDisplay"></span>

</nav>

</div>
</header>

<main class="container">

<h1 class="h1">Play in Browser</h1>

<p class="sub">
Free browser games powered by FreeToGame API
</p>

<div class="hr"></div>

<section class="card">
<div class="card-pad">

<p class="card-title">Game Library</p>

<input id="searchInput" placeholder="Search games..." style="width:100%;padding:10px;margin-bottom:15px;">

<div id="gameButtons" class="btn-row" style="flex-wrap:wrap;"></div>

<iframe id="gameFrame"
style="width:100%;height:720px;border:none;background:#000;margin-top:15px;border-radius:8px;">
</iframe>

</div>
</section>

<div class="hr"></div>

<section class="card">
<div class="card-pad">

<p class="card-title">Player Comments</p>

<form onsubmit="addComment(event)">
<input id="commentInput" placeholder="Write a comment..." required style="width:100%;padding:10px;margin-bottom:10px;">
<button class="btn btn-primary">Post Comment</button>
</form>

<div id="commentsList" style="margin-top:20px;"></div>

</div>
</section>

<footer class="footer">© <span id="y"></span> BrownDogGames</footer>

</main>

<script>
document.getElementById("y").textContent = new Date().getFullYear()
</script>

<script>

/* ===============================
LOAD GAMES FROM FREETOGAME API
=============================== */

let allGames=[]

fetch("https://www.freetogame.com/api/games?platform=browser")
.then(res=>res.json())
.then(games=>{

allGames = games

renderGames(games)

})

function renderGames(games){

const container=document.getElementById("gameButtons")
container.innerHTML=""

games.forEach(game=>{

const btn=document.createElement("button")

btn.className="btn"

btn.innerText=game.title

btn.onclick=()=>{

document.getElementById("gameFrame").src = game.game_url

}

container.appendChild(btn)

})

}

/* ===============================
SEARCH
=============================== */

document.getElementById("searchInput").addEventListener("input",function(){

const q=this.value.toLowerCase()

const filtered=allGames.filter(g=>
g.title.toLowerCase().includes(q)
)

renderGames(filtered)

})

</script>

<script type="module">

import { login, supabase } from "../supabase.js"

window.login = login

window.logout = async () => {
 await supabase.auth.signOut()
 location.reload()
}

const GAME_ID = "browser-games"

function escapeHTML(text){
 return text.replace(/[&<>"']/g, m => ({
   "&":"&amp;",
   "<":"&lt;",
   ">":"&gt;",
   '"':"&quot;",
   "'":"&#039;"
 })[m])
}

async function loadComments(){

const { data } = await supabase
.from("comments")
.select("*")
.eq("game", GAME_ID)
.order("id",{ascending:false})

const { data:{session} } = await supabase.auth.getSession()
const userId = session?.user?.id

const list=document.getElementById("commentsList")
list.innerHTML=""

if(!data) return

data.forEach(c=>{

const div=document.createElement("div")

div.style.display="flex"
div.style.gap="10px"
div.style.padding="12px"
div.style.borderBottom="1px solid #333"

const deleteBtn = userId===c.user_id
? `<button onclick="deleteComment(${c.id})">🗑</button>`
: ""

div.innerHTML = `

<a href="https://github.com/${c.username}" target="_blank">
<img src="${c.avatar_url}" style="width:40px;height:40px;border-radius:50%;">
</a>

<div style="flex:1">

<strong>
<a href="https://github.com/${c.username}" target="_blank">
${c.username}
</a>
</strong>

<br>

${escapeHTML(c.text)}

<br>

<button onclick="likeComment(${c.id},${c.likes||0})">
👍 ${c.likes||0}
</button>

${deleteBtn}

</div>
`

list.appendChild(div)

})

}

window.addComment = async function(event){

event.preventDefault()

const { data:{session} } = await supabase.auth.getSession()

if(!session){
alert("Login with GitHub to comment.")
return
}

const text=document.getElementById("commentInput").value.trim()

await supabase.from("comments").insert({
game: GAME_ID,
text: text,
user_id: session.user.id,
username: session.user.user_metadata.user_name,
avatar_url: session.user.user_metadata.avatar_url,
likes:0
})

document.getElementById("commentInput").value=""

}

window.likeComment = async function(id,currentLikes){

await supabase
.from("comments")
.update({likes:currentLikes+1})
.eq("id",id)

}

window.deleteComment = async function(id){

if(!confirm("Delete this comment?")) return

await supabase
.from("comments")
.delete()
.eq("id",id)

}

supabase
.channel("comments")
.on("postgres_changes",
{ event:"*", schema:"public", table:"comments" },
payload=>{
loadComments()
})
.subscribe()

loadComments()

</script>

</body>
</html>
