<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>BrownDogGames Portal</title>

<style>

body{
font-family:sans-serif;
background:#111;
color:white;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.game{
border:1px solid #333;
border-radius:6px;
padding:10px;
background:#1a1a1a;
}

.game img{
width:100%;
border-radius:6px;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

#frame{
width:100%;
height:100%;
border:none;
}

#close{
position:absolute;
top:15px;
right:20px;
padding:10px;
z-index:10000;
}

</style>

</head>

<body>

<div class="container">

<h1>Browser Games</h1>

<div id="games" class="games"></div>

</div>

<div id="player">
<button id="close">Close</button>
<iframe id="frame"></iframe>
</div>

<script>

let allGames=[]

fetch("https://api.allorigins.win/raw?url=https://www.freetogame.com/api/games?platform=browser")
.then(res=>res.json())
.then(games=>{

allGames = games

renderGames(games)

})

function renderGames(games){

const container=document.getElementById("games")
container.innerHTML=""

games.forEach(game=>{

const div=document.createElement("div")
div.className="game"

div.innerHTML=`

<img src="${game.thumbnail}">

<h3>${game.title}</h3>

<p>${game.short_description}</p>

<button>Play Game</button>

`

div.querySelector("button").onclick=()=>{
openGame(game.game_url)
}

container.appendChild(div)

})

}

function openGame(url){

document.getElementById("player").style.display="block"
document.getElementById("frame").src=url

}

document.getElementById("close").onclick=function(){

document.getElementById("player").style.display="none"
document.getElementById("frame").src=""

}

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

document.getElementById("player").style.display="none"
document.getElementById("frame").src=""

}

})

</script>

</body>
</html>
