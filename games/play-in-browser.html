<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Play in Browser — BrownDogGames</title>

<link rel="stylesheet" href="../styles.css"/>
<link rel="icon" href="../assets/images/MainIcon.png">

<style>

.game-list{
margin-top:20px;
}

.game-item{
border:1px solid #333;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.game-item img{
width:200px;
border-radius:6px;
}

</style>

</head>

<body>

<main class="container">

<h1>Browser Games</h1>

<input id="searchInput" placeholder="Search games..." style="width:100%;padding:10px;margin-bottom:20px;">

<div id="gameList" class="game-list"></div>

<h2>Game Player</h2>

<iframe id="gameFrame"
style="width:100%;height:700px;border:none;background:black;border-radius:8px;">
</iframe>

</main>

<script>

let allGames=[]

/* =========================
LOAD API THROUGH PROXY
========================= */

fetch("https://api.allorigins.win/raw?url=https://www.freetogame.com/api/games?platform=browser")
.then(res=>res.json())
.then(games=>{

allGames = games

renderGames(games)

})

function renderGames(games){

const list=document.getElementById("gameList")
list.innerHTML=""

games.forEach(game=>{

const div=document.createElement("div")
div.className="game-item"

div.innerHTML=`

<img src="${game.thumbnail}">

<h3>${game.title}</h3>

<p>${game.short_description}</p>

<a href="${game.game_url}" target="_blank">
${game.game_url}
</a>

<br><br>

<button>Play in Frame</button>

`

div.querySelector("button").onclick=()=>{
document.getElementById("gameFrame").src = game.game_url
}

list.appendChild(div)

})

}

/* =========================
SEARCH
========================= */

document.getElementById("searchInput").addEventListener("input",function(){

const q=this.value.toLowerCase()

const filtered=allGames.filter(g=>
g.title.toLowerCase().includes(q)
)

renderGames(filtered)

})

</script>

</body>
</html>
