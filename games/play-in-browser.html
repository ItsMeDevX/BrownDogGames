<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BrownDogGames Portal</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

#search{
width:100%;
padding:12px;
margin-bottom:20px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.game{
border:1px solid #333;
border-radius:6px;
padding:10px;
background:#1a1a1a;
}

.game img{
width:100%;
border-radius:6px;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

#frame{
width:100%;
height:100%;
border:none;
}

#close{
position:absolute;
top:15px;
right:20px;
z-index:10000;
padding:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>BrownDogGames Portal</h1>

<input id="search" placeholder="Search games...">

<h2>FreeToGame Browser Games</h2>
<div id="freeGames" class="games"></div>

<h2>Itch.io HTML5 Games</h2>
<div id="itchGames" class="games"></div>

<button onclick="loadMoreItch()">Load More itch.io Games</button>

</div>

<div id="player">
<button id="close">Close</button>
<iframe id="frame"></iframe>
</div>

<script>

let freeGames=[]
let itchGames=[]
let itchPage=1

/* =========================
LOAD FREETOGAME
========================= */

fetch("https://api.allorigins.win/raw?url=https://www.freetogame.com/api/games?platform=browser")
.then(res=>res.json())
.then(games=>{

freeGames = games

renderFreeGames(games)

})

function renderFreeGames(games){

const container=document.getElementById("freeGames")
container.innerHTML=""

games.forEach(game=>{

const div=document.createElement("div")
div.className="game"

div.innerHTML=`

<img src="${game.thumbnail}">

<h3>${game.title}</h3>

<p>${game.short_description}</p>

<button>Play</button>

`

div.querySelector("button").onclick=()=>{
openGame(game.game_url)
}

container.appendChild(div)

})

}

/* =========================
LOAD ITCH.IO
========================= */

async function loadMoreItch(){

const proxy="https://api.allorigins.win/raw?url="
const url=`https://itch.io/games/html5?page=${itchPage}`

const res=await fetch(proxy+encodeURIComponent(url))
const html=await res.text()

const parser=new DOMParser()
const doc=parser.parseFromString(html,"text/html")

const items=doc.querySelectorAll(".game_cell")

items.forEach(item=>{

const title=item.querySelector(".title").innerText
const link=item.querySelector("a").href

const game={title,link}

itchGames.push(game)

renderItchGame(game)

})

itchPage++

}

function renderItchGame(game){

const container=document.getElementById("itchGames")

const div=document.createElement("div")
div.className="game"

div.innerHTML=`

<h3>${game.title}</h3>

<button>Open Game</button>

`

div.querySelector("button").onclick=()=>{
window.open(game.link,"_blank")
}

container.appendChild(div)

}

loadMoreItch()

/* =========================
SEARCH
========================= */

document.getElementById("search").addEventListener("input",function(){

const q=this.value.toLowerCase()

const filtered=freeGames.filter(g=>
g.title.toLowerCase().includes(q)
)

renderFreeGames(filtered)

})

/* =========================
GAME PLAYER
========================= */

function openGame(url){

document.getElementById("player").style.display="block"

document.getElementById("frame").src=url

}

document.getElementById("close").onclick=function(){

document.getElementById("player").style.display="none"

document.getElementById("frame").src=""

}

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

document.getElementById("player").style.display="none"
document.getElementById("frame").src=""

}

})

</script>

</body>
</html>
