<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Play in Browser — BrownDogGames</title>

<link rel="stylesheet" href="../styles.css"/>
<link rel="icon" href="../assets/images/MainIcon.png">

<style>

.game-list{
margin-top:20px;
}

.game-item{
border:1px solid #333;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.game-item img{
width:200px;
border-radius:6px;
}

/* FULLSCREEN GAME PLAYER */

#gameOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

#gameFrame{
width:100%;
height:100%;
border:none;
background:black;
}

#closeGame{
position:absolute;
top:20px;
right:20px;
padding:10px;
}

#fullscreenBtn{
position:absolute;
top:20px;
right:120px;
padding:10px;
}

#loading{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

</style>

</head>

<body>

<main class="container">

<h1>Browser Games</h1>

<input id="searchInput" placeholder="Search games..." style="width:100%;padding:10px;margin-bottom:20px;">

<div id="gameList" class="game-list"></div>

</main>

<!-- FULLSCREEN PLAYER -->

<div id="gameOverlay">

<button id="closeGame">Close</button>
<button id="fullscreenBtn">Fullscreen</button>

<div id="loading">Loading Game...</div>

<iframe id="gameFrame"></iframe>

</div>

<script>

let allGames=[]

/* LOAD API */

fetch("https://api.allorigins.win/raw?url=https://www.freetogame.com/api/games?platform=browser")
.then(res=>res.json())
.then(games=>{

allGames = games

renderGames(games)

})

/* RENDER GAMES */

function renderGames(games){

const list=document.getElementById("gameList")
list.innerHTML=""

games.forEach(game=>{

const div=document.createElement("div")
div.className="game-item"

div.innerHTML=`

<img src="${game.thumbnail}">

<h3>${game.title}</h3>

<p>${game.short_description}</p>

<a href="${game.game_url}" target="_blank">
${game.game_url}
</a>

<br><br>

<button>Play in Frame</button>

`

div.querySelector("button").onclick=()=>{

document.getElementById("gameOverlay").style.display="block"

const frame=document.getElementById("gameFrame")

document.getElementById("loading").style.display="flex"

frame.src = game.game_url

frame.onload=()=>{
document.getElementById("loading").style.display="none"
}

}

list.appendChild(div)

})

}

/* SEARCH */

document.getElementById("searchInput").addEventListener("input",function(){

const q=this.value.toLowerCase()

const filtered=allGames.filter(g=>
g.title.toLowerCase().includes(q)
)

renderGames(filtered)

})

/* CLOSE GAME */

function closeGame(){

document.getElementById("gameOverlay").style.display="none"

document.getElementById("gameFrame").src=""

}

document.getElementById("closeGame").onclick=closeGame

/* ESC KEY CLOSE */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){
closeGame()
}

})

/* FULLSCREEN */

document.getElementById("fullscreenBtn").onclick=function(){

const iframe=document.getElementById("gameFrame")

if(iframe.requestFullscreen){
iframe.requestFullscreen()
}

}

</script>

</body>
</html>
