<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Play in Browser — BrownDogGames</title>

<link rel="stylesheet" href="../styles.css"/>
<link rel="icon" href="../assets/images/MainIcon.png" type="image/png">

<script>
(function(s){s.dataset.zone='9353937',s.src='https://al5sm.com/tag.min.js'})
([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
</script>

<script>
(function(s){s.dataset.zone='9368472',s.src='https://gizokraijaw.net/vignette.min.js'})
([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
</script>

<meta name="description" content="Play browser games directly on BrownDogGames.">
<meta name="keywords" content="browser games, html5 games, play online games">
<meta name="author" content="BrownDogGames">

</head>

<body>

<header class="nav">
<div class="nav-inner">

<a class="brand" href="../index.html">
<img src="../assets/images/MainIcon.png" alt="BrownDogGames logo" class="site-logo">
<span>BrownDogGames</span>
</a>

<nav class="nav-links">
<a href="../index.html">Home</a>
<a href="../games.html">Games</a>
<a href="../music.html">Music</a>
<a href="../assets.html">Templates & Assets</a>
<a href="../support.html">Support</a>
<a href="../community.html">Community</a>

<button id="loginBtn" onclick="login()">Login with GitHub</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
<span id="userDisplay" style="margin-left:10px;"></span>
</nav>

</div>
</header>

<main class="container">

<h1 class="h1">Play in Browser</h1>

<p class="sub">
Play HTML games directly inside your browser.
</p>

<div class="hr"></div>

<section class="card">
<div class="card-pad">

<p class="card-title">Game Library</p>

<p class="card-muted">
Select a game to start playing.
</p>

<div class="btn-row">

<button class="btn btn-primary"
onclick="loadGame('https://yourusername.github.io/game1/')">
Game 1
</button>

<button class="btn"
onclick="loadGame('https://yourusername.github.io/game2/')">
Game 2
</button>

<button class="btn"
onclick="loadGame('https://yourusername.github.io/game3/')">
Game 3
</button>

</div>

<iframe id="gameFrame"
style="width:100%;height:720px;border:none;background:#000;margin-top:15px;border-radius:8px;">
</iframe>

</div>
</section>

<div class="hr"></div>

<section class="card">
<div class="card-pad">

<p class="card-title">Screenshots</p>
<p class="card-muted">Click to view larger.</p>

<div class="gallery" style="margin-top:14px;">
<img class="thumb" src="../assets/images/sample1.png">
<img class="thumb" src="../assets/images/sample2.png">
</div>

</div>
</section>

<div class="hr"></div>

<section class="card">
<div class="card-pad">

<p class="card-title">Player Comments</p>

<form onsubmit="addComment(event)">
<input id="commentInput" placeholder="Write a comment..." required style="width:100%;padding:10px;margin-bottom:10px;">
<button class="btn btn-primary">Post Comment</button>
</form>

<div id="commentsList" style="margin-top:20px;"></div>

</div>
</section>

<footer class="footer">© <span id="y"></span> BrownDogGames</footer>

</main>

<script>
document.getElementById("y").textContent = new Date().getFullYear();
</script>

<script>
function loadGame(url){
document.getElementById("gameFrame").src = url;
}
</script>

</body>
</html>
