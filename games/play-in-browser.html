<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Play in Browser — BrownDogGames</title>

<link rel="stylesheet" href="../styles.css"/>
<link rel="icon" href="../assets/images/MainIcon.png">

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.game-list{
margin-top:20px;
}

.game-item{
border:1px solid #333;
padding:10px;
margin-bottom:10px;
border-radius:6px;
background:#1a1a1a;
}

.game-item img{
width:200px;
border-radius:6px;
}

/* CATEGORY FILTER */

select{
width:100%;
padding:10px;
margin-bottom:20px;
background:#111;
color:white;
border:1px solid #333;
}

/* FULLSCREEN OVERLAY */

#gameOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

#gameFrame{
width:100%;
height:100%;
border:none;
}

/* BUTTONS */

.overlay-btn{
position:absolute;
top:20px;
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

#closeGame{
right:20px;
background:red;
}

#fullscreenBtn{
right:110px;
background:#3b82f6;
}

/* LOADING */

#loadingScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
z-index:5;
}

</style>

</head>

<body>

<main class="container">

<h1>Browser Games</h1>

<select id="categoryFilter">
<option value="all">All Categories</option>
<option value="MMORPG">MMORPG</option>
<option value="Shooter">Shooter</option>
<option value="Strategy">Strategy</option>
<option value="Card">Card</option>
<option value="Racing">Racing</option>
<option value="Sports">Sports</option>
</select>

<div id="gameList" class="game-list"></div>

</main>

<!-- GAME OVERLAY -->

<div id="gameOverlay">

<button id="closeGame" class="overlay-btn">Close</button>
<button id="fullscreenBtn" class="overlay-btn">Fullscreen</button>

<div id="loadingScreen">Loading Game...</div>

<iframe id="gameFrame"></iframe>

</div>

<script>

let allGames=[]

/* LOAD GAMES */

fetch("https://api.allorigins.win/raw?url=https://www.freetogame.com/api/games?platform=browser")
.then(res=>res.json())
.then(games=>{

allGames = games

renderGames(games)

})

/* RENDER GAMES */

function renderGames(games){

const list=document.getElementById("gameList")
list.innerHTML=""

games.forEach(game=>{

const div=document.createElement("div")
div.className="game-item"

div.innerHTML=`

<img src="${game.thumbnail}">

<h3>${game.title}</h3>

<p>${game.short_description}</p>

<p><b>${game.genre}</b></p>

<a href="${game.game_url}" target="_blank">${game.game_url}</a>

<br><br>

<button>Play Game</button>

`

div.querySelector("button").onclick=()=>{

document.getElementById("gameOverlay").style.display="block"

document.getElementById("loadingScreen").style.display="flex"

const frame=document.getElementById("gameFrame")

frame.src = game.game_url

frame.onload=()=>{

document.getElementById("loadingScreen").style.display="none"

}

}

list.appendChild(div)

})

}

/* CATEGORY FILTER */

document.getElementById("categoryFilter").addEventListener("change",function(){

const cat=this.value

if(cat==="all"){
renderGames(allGames)
return
}

const filtered=allGames.filter(g=>g.genre===cat)

renderGames(filtered)

})

/* CLOSE GAME */

function closeGame(){

document.getElementById("gameOverlay").style.display="none"

document.getElementById("gameFrame").src=""

}

document.getElementById("closeGame").onclick=closeGame

/* ESC KEY CLOSE */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){
closeGame()
}

})

/* FULLSCREEN BUTTON */

document.getElementById("fullscreenBtn").onclick=function(){

const iframe=document.getElementById("gameFrame")

if(iframe.requestFullscreen){
iframe.requestFullscreen()
}

}

</script>

</body>

</html>
