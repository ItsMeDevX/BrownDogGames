<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Play in Browser — BrownDogGames</title>

<link rel="stylesheet" href="../styles.css"/>
<link rel="icon" href="../assets/images/MainIcon.png">

<style>

.game-list{
margin-top:20px;
}

.game-item{
border:1px solid #333;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.game-item img{
width:200px;
border-radius:6px;
}

/* FULLSCREEN GAME PLAYER */

#gameOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

#gameOverlay iframe{
width:100%;
height:100%;
border:none;
}

#closeGame{
position:absolute;
top:15px;
right:20px;
padding:10px 15px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
z-index:10000;
}

</style>

</head>

<body>

<main class="container">

<h1>Browser Games</h1>

<div id="gameList" class="game-list"></div>

</main>

<!-- FULLSCREEN GAME PLAYER -->

<div id="gameOverlay">

<button id="closeGame">Close</button>

<iframe id="gameFrame"></iframe>

</div>

<script>

let allGames=[]

fetch("https://api.allorigins.win/raw?url=https://www.freetogame.com/api/games?platform=browser")
.then(res=>res.json())
.then(games=>{
allGames = games
renderGames(games)
})

function renderGames(games){

const list=document.getElementById("gameList")
list.innerHTML=""

games.forEach(game=>{

const div=document.createElement("div")
div.className="game-item"

div.innerHTML=`

<img src="${game.thumbnail}">

<h3>${game.title}</h3>

<p>${game.short_description}</p>

<br>

<button>Play Game</button>

`

div.querySelector("button").onclick=()=>{

document.getElementById("gameFrame").src = game.game_url
document.getElementById("gameOverlay").style.display="block"

}

list.appendChild(div)

})

}

/* CLOSE GAME */

document.getElementById("closeGame").onclick=()=>{

document.getElementById("gameOverlay").style.display="none"
document.getElementById("gameFrame").src=""

}

</script>

</body>
</html>
