<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Play in Browser — BrownDogGames</title>

<link rel="stylesheet" href="../styles.css"/>
<link rel="icon" href="../assets/images/MainIcon.png">

<style>

.game-list{
margin-top:20px;
}

.game-item{
border:1px solid #333;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.game-item img{
width:200px;
border-radius:6px;
}

/* FULL PAGE PLAYER */

#gameOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

#gameFrame{
width:100%;
height:100%;
border:none;
background:black;
}

#closeGame{
position:absolute;
top:20px;
right:20px;
padding:10px;
z-index:10000;
}

</style>

</head>

<body>

<main class="container">

<h1>Browser Games</h1>

<div id="gameList" class="game-list"></div>

</main>

<div id="gameOverlay">
<button id="closeGame">Close</button>
<iframe id="gameFrame"></iframe>
</div>

<script>

let allGames=[]

fetch("https://api.allorigins.win/raw?url=https://www.freetogame.com/api/games?platform=browser")
.then(res=>res.json())
.then(games=>{

allGames = games
renderGames(games)

})

function renderGames(games){

const list=document.getElementById("gameList")
list.innerHTML=""

games.forEach(game=>{

const div=document.createElement("div")
div.className="game-item"

div.innerHTML = `

<img src="${game.thumbnail}">

<h3>${game.title}</h3>

<p>${game.short_description}</p>

<a href="${game.game_url}" target="_blank">
${game.game_url}
</a>

<br><br>

<button>Play in Frame</button>

`

div.querySelector("button").onclick=()=>{

document.getElementById("gameOverlay").style.display="block"

document.getElementById("gameFrame").src = game.game_url

}

list.appendChild(div)

})

}

document.getElementById("closeGame").onclick=function(){

document.getElementById("gameOverlay").style.display="none"

document.getElementById("gameFrame").src=""

}

</script>

</body>
</html>
