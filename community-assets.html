</div>

<main class="container">

<h1 class="h1">Community Assets</h1>
<p class="sub">Assets shared by the community.</p>

<section class="card">
<div class="card-pad">
<p class="card-title">Add Your Asset</p>

<form onsubmit="addLink(event,'assets')">
<input placeholder="Game Name" id="title" required style="width:100%;padding:10px;margin-bottom:10px;">
<input placeholder="Game Link" id="link" required style="width:100%;padding:10px;margin-bottom:10px;">

</div>
</section>

© <span id="y"></span> BrownDogGames

</main>

<!-- 🔥 ASSET MODAL -->

<div id="assetModal" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  z-index:9999;
">
  <span id="closeAsset" style="
    position:absolute;
    top:15px;
    right:20px;
    font-size:28px;
    color:white;
    cursor:pointer;
    z-index:10000;
  ">✕</span>

  <iframe id="assetFrame" allow="autoplay" style="
    width:100%;
    height:100%;
    border:none;
  "></iframe>
</div>

<script>
document.getElementById("y").textContent = new Date().getFullYear()

function openAsset(url){
  const modal = document.getElementById("assetModal")
  const frame = document.getElementById("assetFrame")

  // 🎮 Sketchfab short links (skfb.ly)
  if(url.includes("skfb.ly")){
    const id = url.split("skfb.ly/")[1]
    url = "https://sketchfab.com/models/" + id + "/embed"
  }

  // 🎮 Sketchfab full links
  if(url.includes("sketchfab.com") && !url.includes("/embed")){
    url = url.replace(/\/$/, "") + "/embed"
  }

  modal.style.display = "block"
  frame.src = url
}

function closeAsset(){
  document.getElementById("assetModal").style.display = "none"
  document.getElementById("assetFrame").src = ""
}

document.getElementById("closeAsset").onclick = closeAsset

// 🔥 Same click system as games page
document.addEventListener("click", function(e){
  const link = e.target.closest("a")

  if(link && link.href && link.closest("#assetsList")){
    e.preventDefault()
    openAsset(link.href)
  }
})
</script>

<!-- COMMUNITY SYSTEM -->

<script type="module">
import { addLink, loadLinks } from "./community.js"
import { login, supabase } from "./supabase.js"

window.addLink = addLink
window.login = login

window.logout = async () => {
  await supabase.auth.signOut()
  location.reload()
}

loadLinks("assets")

supabase.auth.onAuthStateChange((event, session) => {
  if(session){
    document.getElementById("loginBtn").style.display="none"
    document.getElementById("logoutBtn").style.display="inline-block"

    document.getElementById("userDisplay").innerText =
      session.user.user_metadata.user_name

    if(window.location.hash.includes("access_token")){
      history.replaceState({},document.title,window.location.pathname)
    }
  }
})

const {data:{session}} = await supabase.auth.getSession()

if(session){
  document.getElementById("loginBtn").style.display="none"
  document.getElementById("logoutBtn").style.display="inline-block"

  document.getElementById("userDisplay").innerText =
    session.user.user_metadata.user_name
}
</script>

</body>
</html>
