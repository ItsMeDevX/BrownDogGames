<meta name="keywords" content="community assets, game assets, Unreal Engine assets, developer resources, BrownDogGames community">

</head>

<body>

<header class="nav">
<div class="nav-inner">

<a class="brand" href="index.html">
<img src="assets/images/MainIcon.png" class="site-logo">
<span>BrownDogGames</span>
</a>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="community.html">Community</a>

<button id="loginBtn" onclick="login()">Login with GitHub</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
<span id="userDisplay" style="margin-left:10px;"></span>

</nav>
</div>
</header>

<main class="container">

<h1 class="h1">Community Assets</h1>
<p class="sub">Assets shared by the community.</p>

<section class="card">
<div class="card-pad">

<p class="card-title">Add Your Game</p>

<form onsubmit="addLink(event,'assets')">
<input placeholder="Game Name" id="title" required style="width:100%;padding:10px;margin-bottom:10px;">
<input placeholder="Game Link" id="link" required style="width:100%;padding:10px;margin-bottom:10px;">
<button class="btn btn-primary">Add Asset</button>
</form>

<div id="assetsList" style="margin-top:20px;"></div>

</div>
</section>

<footer class="footer">
© <span id="y"></span> BrownDogGames
</footer>

</main>


<!-- EMBED VIEWER -->
<div id="embedViewer" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
flex-direction:column;
">

<div style="padding:10px;background:#111;color:white;display:flex;justify-content:space-between;">
<span>Asset Viewer</span>
<button onclick="closeViewer()">Close</button>
</div>

<div id="viewerContent" style="flex:1;"></div>

</div>


<script>

document.getElementById("y").textContent = new Date().getFullYear()


function openViewer(url){

const viewer=document.getElementById("embedViewer")
const content=document.getElementById("viewerContent")

content.innerHTML=""

if(url.includes("itch.io")){

content.innerHTML=`
<iframe src="${url}"
style="width:100%;height:100%;border:none;"></iframe>
`

}

else if(url.includes("gamejolt.com")){

content.innerHTML=`
<iframe src="${url}"
style="width:100%;height:100%;border:none;"></iframe>
`

}

else if(url.includes("drive.google.com")){

const id=url.match(/[-\w]{25,}/)

content.innerHTML=`
<iframe
src="https://drive.google.com/file/d/${id}/preview"
style="width:100%;height:100%;border:none;">
</iframe>
`

}

else if(url.includes("youtube.com") || url.includes("youtu.be")){

let videoID=url.split("v=")[1]||url.split("/").pop()

content.innerHTML=`
<iframe
src="https://www.youtube.com/embed/${videoID}"
style="width:100%;height:100%;border:none;"
allowfullscreen>
</iframe>
`

}

else{

content.innerHTML=`
<iframe src="${url}"
style="width:100%;height:100%;border:none;"></iframe>
`

}

viewer.style.display="flex"

}


function closeViewer(){

document.getElementById("embedViewer").style.display="none"
document.getElementById("viewerContent").innerHTML=""

}


document.addEventListener("keydown",e=>{
if(e.key==="Escape") closeViewer()
})

</script>


<script>
document.getElementById("y").textContent = new Date().getFullYear()
</script>


<!-- COMMUNITY SYSTEM -->
<script type="module">

import { addLink, loadLinks } from "./community.js"
import { login, supabase } from "./supabase.js"

window.addLink = addLink
window.login = login

window.logout = async () => {

await supabase.auth.signOut()
location.reload()

}

loadLinks("assets")

supabase.auth.onAuthStateChange((event, session) => {

if(session){

document.getElementById("loginBtn").style.display="none"
document.getElementById("logoutBtn").style.display="inline-block"

document.getElementById("userDisplay").innerText =
session.user.user_metadata.user_name

if(window.location.hash.includes("access_token")){
history.replaceState({},document.title,window.location.pathname)
}

}

})

const {data:{session}} = await supabase.auth.getSession()

if(session){

document.getElementById("loginBtn").style.display="none"
document.getElementById("logoutBtn").style.display="inline-block"

document.getElementById("userDisplay").innerText =
session.user.user_metadata.user_name

}

</script>

</body>
</html>
