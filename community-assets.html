<meta name="description" content="Discover and share game assets with the BrownDogGames community. Find templates, models, and resources shared by developers.">

<body>

<header class="nav">
<div class="nav-inner">
<a class="brand" href="index.html">
<img src="assets/images/MainIcon.png" class="site-logo">
<span>BrownDogGames</span>
</a>

<nav class="nav-links">
<a href="index.html">Home</a>

<button id="loginBtn" onclick="login()">Login with GitHub</button> <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button> <span id="userDisplay" style="margin-left:10px;"></span>

</nav>
</div>
</header>

<main class="container">

<h1 class="h1">Community Assets</h1>
<p class="sub">Assets shared by the community.</p>

<section class="card">
<div class="card-pad">
<p class="card-title">Add Your Asset</p>

<form onsubmit="addLink(event,'assets')">
<input placeholder="Game Name" id="title" required style="width:100%;padding:10px;margin-bottom:10px;">
<input placeholder="Game Link" id="link" required style="width:100%;padding:10px;margin-bottom:10px;">
<button class="btn btn-primary">Add Asset</button>
</form>

<div id="assetsList" style="margin-top:20px;"></div>

</div>
</section>

<footer class="footer">
© <span id="y"></span> BrownDogGames
</footer>

</main>

<!-- 🔥 MODAL -->

<div id="assetModal" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  z-index:9999;
">

<span id="closeAsset" style="
 position:absolute;
 top:15px;
 right:20px;
 font-size:28px;
 color:white;
 cursor:pointer;
 z-index:10000;
">✕</span>

  <!-- iframe -->

  <iframe id="assetFrame" style="
    width:100%;
    height:100%;
    border:none;
  "></iframe>

  <!-- fallback -->

  <div id="fallback" style="
    display:none;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:20px;
    text-align:center;
  ">
    <h2>Preview not available</h2>
    <p>This site does not allow embedding.</p>
    <button id="openExternal" style="
      padding:12px 20px;
      background:#4da6ff;
      border:none;
      cursor:pointer;
      color:white;
      font-size:16px;
    ">Open Asset ↗</button>
  </div>

</div>

<script>
document.getElementById("y").textContent = new Date().getFullYear()

let currentUrl = ""

function openAsset(url){
  const modal = document.getElementById("assetModal")
  const frame = document.getElementById("assetFrame")
  const fallback = document.getElementById("fallback")

  currentUrl = url

  modal.style.display = "block"
  fallback.style.display = "none"

  frame.src = url

  // ⏱️ detect iframe block
  setTimeout(() => {
    try {
      // If blocked, accessing contentWindow throws error
      frame.contentWindow.location.href
    } catch (e) {
      frame.style.display = "none"
      fallback.style.display = "flex"
    }
  }, 1200)
}

function closeAsset(){
  document.getElementById("assetModal").style.display = "none"
  document.getElementById("assetFrame").src = ""
  document.getElementById("assetFrame").style.display = "block"
}

document.getElementById("closeAsset").onclick = closeAsset

document.getElementById("openExternal").onclick = () => {
  window.open(currentUrl, "_blank")
}

// intercept clicks
document.addEventListener("click", function(e){
  const link = e.target.closest("a")

  if(link && link.href && link.closest("#assetsList")){
    e.preventDefault()
    openAsset(link.href)
  }
})
</script>

<!-- COMMUNITY SYSTEM -->

<script type="module">
import { addLink, loadLinks } from "./community.js"
import { login, supabase } from "./supabase.js"

window.addLink = addLink
window.login = login

window.logout = async () => {
  await supabase.auth.signOut()
  location.reload()
}

loadLinks("assets")

supabase.auth.onAuthStateChange((event, session) => {
  if(session){
    document.getElementById("loginBtn").style.display="none"
    document.getElementById("logoutBtn").style.display="inline-block"

    document.getElementById("userDisplay").innerText =
      session.user.user_metadata.user_name

    if(window.location.hash.includes("access_token")){
      history.replaceState({},document.title,window.location.pathname)
    }
  }
})

const {data:{session}} = await supabase.auth.getSession()

if(session){
  document.getElementById("loginBtn").style.display="none"
  document.getElementById("logoutBtn").style.display="inline-block"

  document.getElementById("userDisplay").innerText =
    session.user.user_metadata.user_name
}
</script>

</body>
</html>
