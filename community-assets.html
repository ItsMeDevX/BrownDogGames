
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Community Assets — BrownDogGames</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="icon" href="assets/images/MainIcon.png">
</head>

<body>

<header class="nav">
<div class="nav-inner">
<a class="brand" href="index.html">
<img src="assets/images/MainIcon.png" class="site-logo">
<span>BrownDogGames</span>
</a>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="community.html">Community</a>
 <button id="loginBtn" onclick="login()">Login with GitHub</button><span id="userDisplay" style="margin-left:10px;"></span></nav>
</div>
</header>

<main class="container">

<h1 class="h1">Community Assets</h1>
<p class="sub">Games shared by the community.</p>

<section class="card">
<div class="card-pad">
<p class="card-title">Add Your Game</p>

<form onsubmit="addLink(event,'assets')">
<input placeholder="Game Name" id="title" required style="width:100%;padding:10px;margin-bottom:10px;">
<input placeholder="Game Link" id="link" required style="width:100%;padding:10px;margin-bottom:10px;">
<button class="btn btn-primary">Add Asset</button>
</form>

<div id="assetsList" style="margin-top:20px;"></div>

</div>
</section>

</main>

<script type="module">
import { login, getUser, supabase } from "./supabase.js"

window.login = login

// Wait for Supabase auth state
supabase.auth.onAuthStateChange(async (event, session) => {

  if(session){
    const btn=document.getElementById("loginBtn")
    if(btn) btn.style.display="none"

    const d=document.getElementById("userDisplay")
    if(d) d.innerText="Logged in"

    // now safe to remove token from URL
    if(window.location.hash.includes("access_token")){
      history.replaceState({},document.title,window.location.pathname)
    }
  }

})

// check existing session
const {data:{session}} = await supabase.auth.getSession()

if(session){
 const btn=document.getElementById("loginBtn")
 if(btn) btn.style.display="none"

 const d=document.getElementById("userDisplay")
 if(d) d.innerText="Logged in"
}

</script>
 

<script type="module">
import { addLink, loadLinks } from "./community.js"
import { login, supabase } from "./supabase.js"

window.addLink = addLink
window.login = login

loadLinks("assets")

supabase.auth.onAuthStateChange((event, session)=>{
 if(session){
  const btn=document.getElementById("loginBtn")
  if(btn) btn.style.display="none"
  const d=document.getElementById("userDisplay")
  if(d) d.innerText="Logged in"
 }
})
</script>
</body>
</html>
