
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="assets/favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>

<body>

<div class="nav">
<img src="assets/logo.png">
<div id="navlinks"></div>
</div>

<div style="max-width:700px;margin:auto;padding:60px;">

<h2>Upload Content</h2>

<input type="file" id="file" style="margin-top:20px;">

<br><br>

<button class="button" onclick="upload()">Upload</button>

</div>

<script>

async function requireAuth(){

const {data:{user}} = await supabase.auth.getUser()

if(!user) location="login.html"

}

requireAuth()

async function upload(){

const file = document.getElementById("file").files[0]

if(!file){

alert("Select a file")
return

}

const {error} = await supabase.storage.from("uploads").upload(file.name,file)

if(error) alert(error.message)
else alert("Upload successful")

}

</script>

<script src="js/nav.js"></script>

</body>
</html>
