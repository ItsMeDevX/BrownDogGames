
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">

<nav class="flex justify-between items-center px-6 py-4 bg-slate-800">
<h1 class="text-xl font-bold">🐶 BrownDogGames</h1>
<a href="index.html">Home</a>
</nav>

<section class="max-w-4xl mx-auto p-10">

<h1 class="text-4xl mb-6">Upload Content</h1>

<div class="bg-slate-800 p-6 rounded">

<select id="type" class="w-full p-2 mb-3 text-black">
<option value="game">Game</option>
<option value="asset">Asset</option>
<option value="music">Music</option>
</select>

<input id="title" placeholder="Title" class="w-full p-2 mb-3 text-black">

<textarea id="description" placeholder="Description" class="w-full p-2 mb-3 text-black"></textarea>

<label>Cover Image</label>
<input type="file" id="image" class="mb-3">

<label>Main File</label>
<input type="file" id="file" class="mb-4">

<button id="uploadBtn" class="bg-orange-500 px-6 py-3 rounded">Upload</button>

</div>

<h2 class="text-2xl mt-10 mb-4">Your Uploads</h2>
<div id="myContent" class="grid md:grid-cols-3 gap-6"></div>

</section>

<script src="supabase.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
