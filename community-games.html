<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Community Games — BrownDogGames</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="icon" href="assets/images/MainIcon.png">

<meta name="description" content="Discover and share indie games from the BrownDogGames community. Explore games created by developers and players.">
<meta name="keywords" content="community games, indie games, developer games, BrownDogGames community, share your game">
<meta name="author" content="BrownDogGames">

<style>
#gameModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  z-index:9999;
}

#gameFrame{
  width:100%;
  height:100%;
  border:none;
}

#closeGame{
  position:absolute;
  top:15px;
  right:20px;
  font-size:28px;
  color:white;
  cursor:pointer;
  z-index:10000;
}
</style>
</head>

<body>

<header class="nav">
<div class="nav-inner">
<a class="brand" href="index.html">
<img src="assets/images/MainIcon.png" class="site-logo">
<span>BrownDogGames</span>
</a>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="community.html">Community</a>

<button id="loginBtn" onclick="login()">Login with GitHub</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
<span id="userDisplay" style="margin-left:10px;"></span>
</nav>
</div>
</header>

<main class="container">

<h1 class="h1">Community Games</h1>
<p class="sub">Games shared by the community.</p>

<section class="card">
<div class="card-pad">
<p class="card-title">Add Your Game</p>

<form onsubmit="addLink(event,'games')">
<input placeholder="Game Name" id="title" required style="width:100%;padding:10px;margin-bottom:10px;">
<input placeholder="Game Link" id="link" required style="width:100%;padding:10px;margin-bottom:10px;">
<button class="btn btn-primary">Add Game</button>
</form>

<div id="gamesList" style="margin-top:20px;"></div>
</div>
</section>

<footer class="footer">
© <span id="y"></span> BrownDogGames
</footer>

</main>

<!-- 🔥 GAME MODAL -->
<div id="gameModal">
  <span id="closeGame">✕</span>
  <iframe id="gameFrame"></iframe>
</div>

<script>
document.getElementById("y").textContent = new Date().getFullYear()

function openGame(url){
  const modal = document.getElementById("gameModal")
  const frame = document.getElementById("gameFrame")

  modal.style.display = "block"
  frame.src = url
}

function closeGame(){
  document.getElementById("gameModal").style.display = "none"
  document.getElementById("gameFrame").src = ""
}

document.getElementById("closeGame").onclick = closeGame

// 🔥 THIS IS THE MAGIC FIX
// Intercept ALL clicks on links inside gamesList
document.addEventListener("click", function(e){
  const link = e.target.closest("a")

  if(link && link.href && link.closest("#gamesList")){
    e.preventDefault()
    openGame(link.href)
  }
})
</script>

<!-- COMMUNITY + AUTH SYSTEM -->
<script type="module">
import { addLink, loadLinks } from "./community.js"
import { login, supabase } from "./supabase.js"

window.addLink = addLink
window.login = login

window.logout = async () => {
  await supabase.auth.signOut()
  location.reload()
}

// Load games
loadLinks("games")

// Auth listener
supabase.auth.onAuthStateChange((event, session) => {
  if(session){
    document.getElementById("loginBtn").style.display="none"
    document.getElementById("logoutBtn").style.display="inline-block"

    document.getElementById("userDisplay").innerText =
      session.user.user_metadata.user_name

    if(window.location.hash.includes("access_token")){
      history.replaceState({},document.title,window.location.pathname)
    }
  }
})

// Check session
const {data:{session}} = await supabase.auth.getSession()

if(session){
  document.getElementById("loginBtn").style.display="none"
  document.getElementById("logoutBtn").style.display="inline-block"

  document.getElementById("userDisplay").innerText =
    session.user.user_metadata.user_name
}
</script>

</body>
</html>
