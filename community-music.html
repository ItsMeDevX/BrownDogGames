
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Community Music — BrownDogGames</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="icon" href="assets/images/MainIcon.png">
</head>

<body>

<header class="nav">
<div class="nav-inner">
<a class="brand" href="index.html">
<img src="assets/images/MainIcon.png" class="site-logo">
<span>BrownDogGames</span>
</a>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="community.html">Community</a>
 <button id="loginBtn" onclick="login()">Login with GitHub</button><span id="userDisplay" style="margin-left:10px;"></span></nav>
</div>
</header>

<main class="container">

<h1 class="h1">Community Music</h1>
<p class="sub">Games shared by the community.</p>

<section class="card">
<div class="card-pad">
<p class="card-title">Add Your Game</p>

<form onsubmit="addLink(event,'music')">
<input placeholder="Game Name" id="title" required style="width:100%;padding:10px;margin-bottom:10px;">
<input placeholder="Game Link" id="link" required style="width:100%;padding:10px;margin-bottom:10px;">
<button class="btn btn-primary">Add Music</button>
</form>

<div id="musicList" style="margin-top:20px;"></div>

</div>
</section>

</main>





<script type="module">
import { addLink, loadLinks } from "./community.js"
import { login, getUser, cleanUrl } from "./supabase.js"

cleanUrl()
window.addLink = addLink
window.login = login

const user = await getUser()

if(user){
 const btn=document.getElementById("loginBtn")
 if(btn) btn.style.display="none"
 const d=document.getElementById("userDisplay")
 if(d) d.innerText="Logged in"
}

loadLinks("music")
</script>
</body>
</html>
