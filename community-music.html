<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Community Music — BrownDogGames</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="icon" href="assets/images/MainIcon.png">
</head>

<script>(function(s){s.dataset.zone='9353937',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<meta name="description" content="Share and discover music from the BrownDogGames community. Explore tracks created by indie developers and creators.">

<meta name="keywords" content="community music, indie music, game music, BrownDogGames community, developer music">

<meta name="author" content="BrownDogGames">
  
<body>

<header class="nav">
<div class="nav-inner">
<a class="brand" href="index.html">
<img src="assets/images/MainIcon.png" class="site-logo">
<span>BrownDogGames</span>
</a>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="community.html">Community</a>

<!-- AUTH BUTTONS -->
<button id="loginBtn" onclick="login()">Login with GitHub</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
<span id="userDisplay" style="margin-left:10px;"></span>

</nav>
</div>
</header>

<main class="container">

<h1 class="h1">Community Music</h1>
<p class="sub">Music shared by the community.</p>

<section class="card">
<div class="card-pad">

<p class="card-title">Add Your Music</p>

<form onsubmit="addLink(event,'music')">
<input placeholder="Music Name" id="title" required style="width:100%;padding:10px;margin-bottom:10px;">
<input placeholder="Music Link" id="link" required style="width:100%;padding:10px;margin-bottom:10px;">
<button class="btn btn-primary">Add Music</button>
</form>

<div id="musicList" style="margin-top:20px;"></div>

</div>
</section>

<footer class="footer">
© <span id="y"></span> BrownDogGames
</footer>

</main>

<script>
document.getElementById("y").textContent = new Date().getFullYear()
</script>

<!-- COMMUNITY + AUTH SYSTEM -->
<script type="module">
import { addLink, loadLinks } from "./community.js"
import { login, supabase } from "./supabase.js"

window.addLink = addLink
window.login = login

window.logout = async () => {
  await supabase.auth.signOut()
  location.reload()
}

// Load music for everyone (even if not logged in)
loadLinks("music")

// Auth state listener
supabase.auth.onAuthStateChange((event, session) => {

  if(session){

    document.getElementById("loginBtn").style.display="none"
    document.getElementById("logoutBtn").style.display="inline-block"

    document.getElementById("userDisplay").innerText =
      session.user.user_metadata.user_name

    if(window.location.hash.includes("access_token")){
      history.replaceState({},document.title,window.location.pathname)
    }

  }

})

// Check existing session
const {data:{session}} = await supabase.auth.getSession()

if(session){

  document.getElementById("loginBtn").style.display="none"
  document.getElementById("logoutBtn").style.display="inline-block"

  document.getElementById("userDisplay").innerText =
    session.user.user_metadata.user_name

}

</script>

</body>
</html>
