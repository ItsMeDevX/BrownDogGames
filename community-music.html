<!-- 🔥 MUSIC MODAL -->

<div id="musicModal" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  z-index:9999;
">
  <span id="closeMusic" style="
    position:absolute;
    top:15px;
    right:20px;
    font-size:28px;
    color:white;
    cursor:pointer;
    z-index:10000;
  ">✕</span>

  <iframe id="musicFrame" allow="autoplay" style="
    width:100%;
    height:100%;
    border:none;
  "></iframe>
</div>

<script>
document.getElementById("y").textContent = new Date().getFullYear()

function openMusic(url){
  const modal = document.getElementById("musicModal")
  const frame = document.getElementById("musicFrame")

  // 🎵 SoundCloud FIX
  if(url.includes("soundcloud.com")){
    url = "https://w.soundcloud.com/player/?url=" + encodeURIComponent(url)
  }

  // 🎥 YouTube FIX
  if(url.includes("youtube.com/watch")){
    const videoId = new URL(url).searchParams.get("v")
    url = "https://www.youtube.com/embed/" + videoId
  }

  if(url.includes("youtu.be/")){
    const videoId = url.split("youtu.be/")[1]
    url = "https://www.youtube.com/embed/" + videoId
  }

  modal.style.display = "block"
  frame.src = url
}

function closeMusic(){
  document.getElementById("musicModal").style.display = "none"
  document.getElementById("musicFrame").src = ""
}

document.getElementById("closeMusic").onclick = closeMusic

// 🔥 Intercept clicks inside music list
document.addEventListener("click", function(e){
  const link = e.target.closest("a")

  if(link && link.href && link.closest("#musicList")){
    e.preventDefault()
    openMusic(link.href)
  }
})
</script>

<!-- COMMUNITY + AUTH SYSTEM -->

<script type="module">
import { addLink, loadLinks } from "./community.js"
import { login, supabase } from "./supabase.js"

window.addLink = addLink
window.login = login

window.logout = async () => {
  await supabase.auth.signOut()
  location.reload()
}

// Load music
loadLinks("music")

// Auth listener
supabase.auth.onAuthStateChange((event, session) => {
  if(session){
    document.getElementById("loginBtn").style.display="none"
    document.getElementById("logoutBtn").style.display="inline-block"

    document.getElementById("userDisplay").innerText =
      session.user.user_metadata.user_name

    if(window.location.hash.includes("access_token")){
      history.replaceState({},document.title,window.location.pathname)
    }
  }
})

// Check session
const {data:{session}} = await supabase.auth.getSession()

if(session){
  document.getElementById("loginBtn").style.display="none"
  document.getElementById("logoutBtn").style.display="inline-block"

  document.getElementById("userDisplay").innerText =
    session.user.user_metadata.user_name
}
</script>

</body>
